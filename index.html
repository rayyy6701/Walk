<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ステップ・オデッセイ (Step Odyssey) 〜歩みの軌跡〜</title>
    <style>
        /* --- Google Fonts & CSS Variables --- */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --bg-color: #0a0a12;
            --panel-bg: rgba(20, 20, 35, 0.75);
            --neon-blue: #00f0ff;
            --neon-purple: #bd00ff;
            --neon-green: #39ff14;
            --text-color: #e2e8f0;
            --text-dark: #64748b;
            --border-glow: 0 0 15px rgba(0, 240, 255, 0.3);
            --font-digital: 'Orbitron', sans-serif;
            --font-main: 'Rajdhani', sans-serif;
        }

        /* --- Reset & Base Styles --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(189, 0, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 240, 255, 0.15) 0px, transparent 50%);
            color: var(--text-color);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* --- Game Container --- */
        .game-container {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 24px;
            width: 100%;
            max-width: 540px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), var(--border-glow);
            display: flex;
            flex-direction: column;
            gap: 25px;
            position: relative;
        }

        /* --- Header / Counter Section --- */
        .header-section {
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .counter-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.1s ease;
        }

        /* 歩数が増えた時のバウンスアニメーション用クラス */
        .counter-bounce {
            animation: bounce 0.15s ease-out;
        }

        @keyframes bounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .total-steps-label {
            font-size: 0.85rem;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .total-steps {
            font-family: var(--font-digital);
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            line-height: 1;
            margin: 5px 0;
        }

        /* --- Progress Bar --- */
        .progress-container {
            margin-top: 15px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .next-milestone {
            color: var(--neon-purple);
            font-weight: 600;
        }

        .progress-bar-bg {
            background: rgba(255, 255, 255, 0.05);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            width: 0%;
            height: 100%;
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- Controls (Walk Button) --- */
        .control-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .btn-walk {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            border: none;
            color: #fff;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            font-family: var(--font-digital);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.3);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            outline: none;
        }

        .btn-walk:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(189, 0, 255, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .btn-walk:active {
            transform: scale(0.95);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }

        /* デバッグ・シミュレーターUI */
        .simulator-tools {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .btn-tool {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            padding: 10px;
            border-radius: 8px;
            font-family: var(--font-main);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-tool:hover {
            background: rgba(0, 240, 255, 0.15);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
        }

        .btn-reset {
            background: rgba(255, 7, 58, 0.05);
            border-color: rgba(255, 7, 58, 0.2);
            color: #ff073a;
        }
        .btn-reset:hover {
            background: rgba(255, 7, 58, 0.2);
            border-color: #ff073a;
            color: #ff3b60;
        }

        /* --- Achievements Section --- */
        .achievements-section {
            flex-grow: 1;
        }

        .section-title {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dark);
            margin-bottom: 12px;
            border-left: 3px solid var(--neon-purple);
            padding-left: 10px;
        }

        .achievement-list {
            max-height: 260px;
            overflow-y: auto;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* カスタムスクールバー */
        .achievement-list::-webkit-scrollbar {
            width: 4px;
        }
        .achievement-list::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        .achievement-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        /* アチーブメントカード基盤 */
        .achievement-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.4s cubic-bezier(0.075, 0.82, 0.165, 1);
            position: relative;
            overflow: hidden;
        }

        /* 未解放（ロック状態） */
        .achievement-card.locked {
            opacity: 0.4;
            filter: grayscale(100%);
        }
        .achievement-card.locked .badge-icon {
            background: #1e1e2f;
            border-color: var(--text-dark);
            animation: none !important;
        }

        /* 解放済み状態 */
        .achievement-card.unlocked {
            background: rgba(0, 240, 255, 0.03);
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.05);
            animation: cardReveal 0.5s ease-out;
        }

        @keyframes cardReveal {
            0% { transform: translateX(-10px); opacity: 0.5; }
            100% { transform: translateX(0); opacity: 1; }
        }

        /* バッジ（アイコン） */
        .badge-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(189, 0, 255, 0.1));
            border: 2px solid var(--neon-blue);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            flex-shrink: 0;
        }
        
        /* 解放済みのアイコンへのネオンアニメーション効果 */
        .achievement-card.unlocked .badge-icon {
            animation: pulseGlow 2s infinite alternate;
        }
        @keyframes pulseGlow {
            0% { border-color: var(--neon-blue); box-shadow: 0 0 5px var(--neon-blue); }
            100% { border-color: var(--neon-purple); box-shadow: 0 0 12px var(--neon-purple); }
        }

        .achieve-info {
            flex-grow: 1;
        }

        .achieve-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 2px;
        }
        .achievement-card.unlocked .achieve-title {
            color: var(--neon-blue);
        }

        .achieve-desc {
            font-size: 0.85rem;
            color: var(--text-dark);
            line-height: 1.2;
        }
        .achievement-card.unlocked .achieve-desc {
            color: var(--text-color);
        }

        .achieve-req {
            font-family: var(--font-digital);
            font-size: 0.8rem;
            color: var(--neon-purple);
            background: rgba(189, 0, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .achievement-card.locked .achieve-req {
            color: var(--text-dark);
            background: rgba(255,255,255,0.05);
        }

        /* --- Fullscreen Congratulation Overlay --- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(5, 5, 10, 0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .celebration-modal {
            background: linear-gradient(135deg, #111126, #1a1a3a);
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 40px rgba(57, 255, 20, 0.4);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .overlay.active .celebration-modal {
            transform: scale(1);
        }

        .celebration-title {
            font-family: var(--font-digital);
            font-size: 2rem;
            color: var(--neon-green);
            text-shadow: 0 0 15px rgba(57, 255, 20, 0.6);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .celebration-badge {
            width: 80px;
            height: 80px;
            margin: 20px auto;
            background: rgba(57, 255, 20, 0.1);
            border: 3px solid var(--neon-green);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
            animation: pulseGreen 1.5s infinite alternate;
        }

        @keyframes pulseGreen {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); }
            100% { transform: scale(1.05); box-shadow: 0 0 30px rgba(57, 255, 20, 0.6); }
        }

        .celebration-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .celebration-desc {
            font-size: 0.95rem;
            color: var(--text-dark);
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .btn-close {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-main);
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .btn-close:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 15px var(--neon-green);
        }

        /* パーティクル用キャンバス */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header-section">
            <h1>Step Odyssey</h1>
            <div class="counter-box" id="counterBox">
                <div class="total-steps-label">Total Progress</div>
                <div class="total-steps" id="totalSteps">0</div>
                <div class="total-steps-label">STEPS</div>
            </div>
            
            <div class="progress-container">
                <div class="progress-info">
                    <span>Next Milestone</span>
                    <span class="next-milestone" id="nextMilestone">100歩</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
            </div>
        </div>

        <div class="control-section">
            <button class="btn-walk" id="btnWalk">WALK</button>
            
            <div class="simulator-tools">
                <button class="btn-tool" onclick="addSteps(10)">+10 歩</button>
                <button class="btn-tool" onclick="addSteps(50)">+50 歩</button>
                <button class="btn-tool" onclick="addSteps(100)">+100 歩</button>
                <button class="btn-tool btn-reset" onclick="resetGame()">RESET</button>
            </div>
        </div>

        <div class="achievements-section">
            <div class="section-title">Unlocked Achievements</div>
            <div class="achievement-list" id="achievementList">
                </div>
        </div>
    </div>

    <div class="overlay" id="celebrationOverlay">
        <div class="celebration-modal">
            <div class="celebration-title">ACHIEVEMENT UNLOCKED!</div>
            <div class="celebration-badge" id="celebrationBadge">🏆</div>
            <div class="celebration-name" id="celebrationName">称号名</div>
            <div class="celebration-desc" id="celebrationDesc">フレーバーテキスト</div>
            <button class="btn-close" id="btnCloseOverlay">Close</button>
        </div>
    </div>
    
    <canvas id="particleCanvas"></canvas>

    <script>
        // --- アチーブメントデータ定義（100歩ごとに1000歩以上まで完全網羅） ---
        const achievementData = [
            { req: 100,  title: "最初の覚醒", icon: "🌱", desc: "広大なデジタル・オデッセイへの第一歩。すべての旅はここから始まる。" },
            { req: 200,  title: "加速するパルス", icon: "⚡", desc: "ニューロンの速度が上がってきた。街のノイズが心地よいBGMに変わる。" },
            { req: 300,  title: "アスファルトの開拓者", icon: "👟", desc: "地面を捉える感覚が鋭敏になる。この世界の舗装は君のためにある。" },
            { req: 400,  title: "ネオン・ランナー", icon: "🌆", desc: "サイバー空間の光を追い抜く速度。残像すら美しい。" },
            { req: 500,  title: "ハーフウェイ・マトリクス", icon: "🎯", desc: "500歩到達！折り返し地点を超え、肉体は完全にシステムと同期した。" },
            { req: 600,  title: "永久機関の鼓動", icon: "🔋", desc: "疲労を知らない足取り。君の心臓はクァンタム・コア駆動か？" },
            { req: 700,  title: "重力からの解放", icon: "🚀", desc: "一歩のストライドがまるで跳躍。引力すら君を縛ることはできない。" },
            { req: 800,  title: "超空間の歩行術", icon: "🔮", desc: "現実と仮想の境界線をすり抜ける。洗練されたステップの極み。" },
            { req: 900,  title: "神速のトリガー", icon: "🔥", desc: "熱を帯びた足裏が火花を散らす。臨界突破まであとわずか！" },
            { req: 1000, title: "ステラ・ウォーカー", icon: "✨", desc: "1000歩達成！星々の軌跡を歩み、伝説となった者に贈られる至高の栄誉。" }
        ];

        // --- ゲーム状態管理 ---
        let gameState = {
            totalSteps: 0,
            unlockedIds: [] // 解放済みの必要歩数(req)を記録
        };

        // --- DOM要素の取得 ---
        const totalStepsEl = document.getElementById('totalSteps');
        const counterBoxEl = document.getElementById('counterBox');
        const nextMilestoneEl = document.getElementById('nextMilestone');
        const progressBarEl = document.getElementById('progressBar');
        const achievementListEl = document.getElementById('achievementList');
        const btnWalk = document.getElementById('btnWalk');
        
        // オーバーレイ用
        const celebrationOverlay = document.getElementById('celebrationOverlay');
        const celebrationBadge = document.getElementById('celebrationBadge');
        const celebrationName = document.getElementById('celebrationName');
        const celebrationDesc = document.getElementById('celebrationDesc');
        const btnCloseOverlay = document.getElementById('btnCloseOverlay');
        
        // キャンバス用
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        // --- 初期化処理 ---
        function initGame() {
            // ローカルストレージからデータをロード
            const savedData = localStorage.getItem('stepOdyssey_save');
            if (savedData) {
                gameState = JSON.parse(savedData);
            }
            
            // UIの初期描画
            updateUI();
            renderAchievements();
            setupCanvas();
            
            // イベントリスナーの登録
            btnWalk.addEventListener('click', () => addSteps(1));
            btnCloseOverlay.addEventListener('click', closeCelebration);
            window.addEventListener('resize', setupCanvas);
        }

        // --- 歩数加算処理 ---
        function addSteps(amount) {
            gameState.totalSteps += amount;
            
            // カウンターのバウンスアニメーション発火
            counterBoxEl.classList.remove('counter-bounce');
            void counterBoxEl.offsetWidth; // リフローを起こしてアニメーションを再トリガー
            counterBoxEl.classList.add('counter-bounce');
            
            // 新規アチーブメントのチェック
            checkAchievements();
            
            // 状態の保存とUI更新
            saveGame();
            updateUI();
        }

        // --- UI更新ロジック ---
        function updateUI() {
            // カウンターテキスト更新
            totalStepsEl.textContent = gameState.totalSteps.toLocaleString();
            
            // 次のマイルストーン計算
            let nextReq = 100;
            for (let i = 0; i < achievementData.length; i++) {
                if (gameState.totalSt
